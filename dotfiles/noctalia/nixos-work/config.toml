background_opacity = 0.88
background_radius = 12.0
input_opacity = 1.0
input_radius = 6.0
show_login_button = true

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
box_height = 0.0
box_width = 0.0
cx = 768.0
cy = 837.0
output = "eDP-1"
rotation = 0.0
type = "login_box"

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
background_color = "surface_variant"
background_opacity = 0.88
background_radius = 12.0
input_opacity = 1.0
input_radius = 6.0
show_login_button = true

[shell]
polkit_agent = true
telemetry_enabled = true

[shell.panel]
launcher_session_search = true
open_near_click_control_center = true

[theme]
builtin = "Rosé Pine"
community_palette = "Oxocarbon"
mode = "light"
source = "builtin"
wallpaper_scheme = "m3-content"

[theme.templates]
builtin_ids = [
  "btop",
  "gtk3",
  "gtk4",
  "kcolorscheme",
  "kitty",
  "niri",
  "qt",
  "wezterm",
]
community_ids = [
  "neovim",
  "obsidian",
  "vscode",
  "rofi",
  "discord",
  "steam",
  "telegram",
  "yazi",
]

[wallpaper]
directory = "/home/felix/Pictures/Wallpapers"

[wallpaper.default]
