[bar.default]
end = [
  "tray",
  "notifications",
  "clipboard",
  "network",
  "bluetooth",
  "volume",
  "battery",
  "theme_mode",
  "control-center",
  "session",
]
start = [
  "launcher",
  "workspaces",
  "sysmon_cpu",
  "sysmon_temp",
  "sysmon_ram",
  "sysmon_disk",
  "media",
]
widget_spacing = 8

[battery.device."/org/freedesktop/UPower/devices/keyboard_dev_CA_05_C8_20_26_20"]
warning_threshold = 20

[calendar]
enabled = true

[calendar.account.100308131219676775770]
name = "Felix Rath (yahoo+gmail)"
type = "google"

[control_center]
sidebar = "full"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = []

[desktop_widgets.grid]
cell_size = 16
major_interval = 4
visible = true

[desktop_widgets.widget]

[location]
auto_locate = true

[lockscreen_widgets]
schema_version = 2
widget_order = ["lockscreen-login-box@HDMI-A-1", "lockscreen-login-box@eDP-1"]

[lockscreen_widgets.grid]
cell_size = 16
major_interval = 4
visible = true

[lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
