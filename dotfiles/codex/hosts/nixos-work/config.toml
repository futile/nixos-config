#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
model_reasoning_effort = "medium"
model_verbosity = "medium"
personality = "pragmatic"
notify = ["/home/felix/nixos/bin/codex-notify-noctalia"]

[tools]
view_image = true

[tui]
notifications = ["approval-requested"]
notification_method = "osc9"
notification_condition = "unfocused"
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "git-branch", "five-hour-limit", "weekly-limit"]
terminal_title = ["spinner", "project", "app-name"]
status_line_use_colors = true
session_picker_view = "comfortable"
theme = "catppuccin-latte"
pet = "disabled"

[tui.model_availability_nux]
"gpt-5.5" = 4

[features]
hooks = true
multi_agent = true
apps = false

[sandbox_workspace_write]
writable_roots = [
  "/home/felix/.cache/sccache",
  "/home/felix/.cache/codebase-memory-mcp",
  "/home/felix/.codex/context-mode",
  "/home/felix/.local/share/rtk",
  "/home/felix/.serena",
]
# 2026-05-06 gonna try this out for a bit
network_access = true

[projects."/home/felix/gits/pale-darks-online"]
trust_level = "trusted"

[projects."/home/felix/.codex"]
trust_level = "trusted"

[projects."/home/felix/nixos"]
trust_level = "trusted"

[projects."/home/felix/gits/nixpkgs"]
trust_level = "trusted"

[projects."/home/felix/gits/cargo-worktrees-caching-testing"]
trust_level = "trusted"

[projects."/home/felix/gits/Marker"]
trust_level = "trusted"

[projects."/home/felix/gits/llm_wiki"]
trust_level = "trusted"

[projects."/tmp"]
trust_level = "trusted"

[mcp_servers.DeepWiki]
url = "https://mcp.deepwiki.com/mcp"

[mcp_servers.DeepWiki.tools.read_wiki_structure]
approval_mode = "approve"

[mcp_servers.DeepWiki.tools.ask_question]
approval_mode = "approve"

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = false

[plugins."google-calendar@openai-curated"]
enabled = false

[plugins."google-drive@openai-curated"]
enabled = false

